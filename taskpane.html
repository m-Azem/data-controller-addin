<!doctype html><html><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Data Controller</title><script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script><link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"/><link href="fe4b6df37c5deafd95bb.css" rel="stylesheet"/><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script><script defer="defer" src="commands.js"></script><script defer="defer" src="functions.js"></script></head><body class="ms-font-m ms-welcome"><header class="ms-welcome__header"><div class="header-left"><button id="convert-values-button" class="icon-btn" title="Convert DC Formulas to Values"><i class="ms-Icon ms-Icon--NumberSymbol"></i></button></div><h1 class="title-text">Data Controller</h1><div class="header-right"><button id="settings-button" class="icon-btn" title="Settings"><i class="ms-Icon ms-Icon--Settings"></i></button></div></header><main class="ms-welcome__main"><div id="status-area" class="ms-font-s status-container"><button id="refresh-formulas-button" class="icon-btn" title="Refresh Dashboard & Formulas" style="margin-right:8px;color:var(--text-color);width:24px;height:24px"><i class="ms-Icon ms-Icon--Refresh"></i></button> <span style="margin-right:6px;color:#888;font-weight:400">Status:</span> <span id="status-text">Ready</span></div><div id="main-view" class="view-container"><div class="dashboard-controls"><div class="ms-TextField flex-2"><label class="ms-Label">Default Table (Formulas)</label> <select id="default-data-table-select" class="ms-Dropdown-title"></select></div><div class="ms-TextField flex-1"><label class="ms-Label">Revision</label> <select id="default-revision-select" class="ms-Dropdown-title"></select></div></div><button class="accordion" id="formula-builder-accordion" style="margin-top:16px"><i class="ms-Icon ms-Icon--Calculator" style="margin-right:8px"></i> Visual Formula Builder</button><div class="accordion-content" id="formula-builder-content" style="margin-bottom:0"><p class="description-text">Select a function and fill in the parameters. Cell references (e.g. A1) are supported.</p><div class="ms-TextField"><label class="ms-Label">Select Function</label> <select id="formula-select" class="ms-Dropdown-title"><option value="GET" selected="selected">DC.GET</option><option value="SEARCH">DC.SEARCH</option><option value="FILTER">DC.FILTER</option><option value="SUM">DC.SUM</option><option value="SUMIFS">DC.SUMIFS</option><option value="JOIN">DC.JOIN</option></select></div><div id="formula-inputs-container"></div><button id="insert-built-formula-button" class="ms-Button ms-Button--primary w-100" style="margin-top:12px"><span class="ms-Button-label"><i class="ms-Icon ms-Icon--CheckMark" style="margin-right:8px"></i>Insert Formula</span></button></div><ul id="data-table-list" class="data-table-list" style="margin-top:16px"></ul><button class="accordion" id="capture-accordion" style="margin-top:16px"><i class="ms-Icon ms-Icon--Add" style="margin-right:8px"></i> Capture New Table</button><div class="accordion-content" id="capture-content"><p class="description-text">Select a range in Excel, provide a name, then load headers to select the ID column.</p><div class="ms-TextField"><label class="ms-Label">Data Table Name</label> <input id="data-name" class="ms-TextField-field" placeholder="e.g. Bill Of Qunatities"></div><button id="capture-button" class="ms-Button ms-Button--primary w-100"><span class="ms-Button-label"><i class="ms-Icon ms-Icon--Table" style="margin-right:8px"></i>Load Selected Range</span></button><div id="capture-step-2" style="display:none;margin-top:16px;border-top:1px solid var(--border-color);padding-top:16px"><div class="ms-TextField"><label class="ms-Label">Select ID Column</label> <select id="id-column-select" class="ms-Dropdown-title"></select></div><button id="finish-capture-button" class="ms-Button ms-Button--primary w-100"><span class="ms-Button-label"><i class="ms-Icon ms-Icon--CheckMark" style="margin-right:8px"></i>Finish</span></button></div></div></div><div id="settings-view" class="view-container" style="display:none"><div class="settings-group" style="margin-bottom:20px"><label class="ms-Label">Data Backup & Restore</label><p class="description-text" style="font-size:12px;margin-bottom:10px">Download a backup of your data or restore it from a file.</p><div class="button-group flex-col"><button id="backup-button" class="ms-Button ms-Button--default w-100"><span class="ms-Button-label"><i class="ms-Icon ms-Icon--Download" style="margin-right:8px"></i>Backup Data</span></button> <button id="restore-button" class="ms-Button ms-Button--default w-100"><span class="ms-Button-label"><i class="ms-Icon ms-Icon--Upload" style="margin-right:8px"></i>Restore Data</span></button></div><input type="file" id="restore-file-input" accept=".json" style="display:none"/></div><div class="settings-group" style="border-top:1px solid var(--border-color);padding-top:16px"><label class="ms-Label">Theme Appearance</label> <label class="theme-switch"><input type="checkbox" id="theme-toggle"> <span class="slider round"></span> <span class="theme-label-text">Enable Dark Theme</span></label></div><div class="settings-group" style="margin-top:20px;border-top:1px solid var(--border-color);padding-top:16px"><label class="ms-Label">About</label><p style="font-size:12px;color:var(--text-color);margin-top:5px">App Version: <strong id="app-version-display">Loading...</strong></p></div></div></main><div id="custom-modal" class="modal-overlay" style="display:none"><div class="modal-content"><h3 id="modal-title" style="margin-top:0;color:var(--primary-color)"></h3><p id="modal-message" class="description-text" style="font-size:13px"></p><input id="modal-input" class="ms-TextField-field" style="margin-bottom:16px"/><div class="button-group flex-col"><button id="modal-ok" class="ms-Button ms-Button--primary w-100">OK</button> <button id="modal-cancel" class="ms-Button ms-Button--default w-100">Cancel</button></div></div></div><div id="custom-sort-modal" class="modal-overlay" style="display:none"><div class="modal-content"><h3 id="sort-modal-title" style="margin-top:0;color:var(--primary-color)"></h3><p id="sort-modal-message" class="description-text" style="font-size:13px"></p><ul id="sort-modal-list" class="sortable-list"></ul><div class="button-group flex-col" style="margin-top:16px"><button id="sort-modal-ok" class="ms-Button ms-Button--primary w-100">Save Order</button> <button id="sort-modal-cancel" class="ms-Button ms-Button--default w-100">Cancel</button></div></div></div><div id="custom-form-modal" class="modal-overlay" style="display:none"><div class="modal-content"><h3 id="form-modal-title" style="margin-top:0;color:var(--primary-color)"></h3><p id="form-modal-message" class="description-text" style="font-size:13px"></p><div id="form-modal-inputs" style="max-height:50vh;overflow-y:auto;margin-bottom:16px;padding-right:4px"></div><div class="button-group flex-col"><button id="form-modal-ok" class="ms-Button ms-Button--primary w-100">Save</button> <button id="form-modal-cancel" class="ms-Button ms-Button--default w-100">Cancel</button></div></div></div><div id="custom-confirm-modal" class="modal-overlay" style="display:none"><div class="modal-content"><h3 id="confirm-modal-title" style="margin-top:0;color:#d13438"></h3><p id="confirm-modal-message" class="description-text" style="font-size:13px"></p><div class="button-group flex-col" style="margin-top:16px"><button id="confirm-modal-yes" class="ms-Button ms-Button--danger w-100">Yes, Delete</button> <button id="confirm-modal-no" class="ms-Button ms-Button--default w-100">Cancel</button></div></div></div></body></html>
